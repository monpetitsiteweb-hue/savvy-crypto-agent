name: OHLCV 5m Backfill Rerun (targeted, 1 symbol per batch)

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  backfill-5m-rerun:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        batch:
          - '["ETH-EUR"]'
          - '["ADA-EUR"]'
          - '["SOL-EUR"]'
          - '["DOT-EUR"]'
          - '["BCH-EUR"]'
          - '["AVAX-EUR"]'
          - '["LINK-EUR"]'
      max-parallel: 1  # Sequential to respect rate limits
    steps:
      - name: Backfill 5m single symbol
        run: |
          echo "🔄 Backfilling 5m for ${{ matrix.batch }}"
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"symbols":${{ matrix.batch }},"granularities":["5m"],"lookback_days":30}' \
            https://fuieplftlcxdfkxyqzlt.supabase.co/functions/v1/ohlcv-backfill)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP $HTTP_CODE"
          echo "$BODY" | head -c 2000
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "❌ Failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo ""
          echo "✅ Batch complete"
